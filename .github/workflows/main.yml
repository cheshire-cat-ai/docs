name: Build and deploy mkdocs (v2 / latest) on gh-pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 4:00 AM
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # full history so mike can update the gh-pages branch

    - name: Install uv 📦
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv sync

    - name: Clone core (v2) 🐱
      uses: actions/checkout@v4
      with:
        repository: cheshire-cat-ai/core
        ref: v2
        # Relative path under $GITHUB_WORKSPACE to place the repository
        path: core

    - name: Configure Git 🔧
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Deploy v2 as "latest" with mike 🚀
      # The prepare_cat hook materialises ./cat from core/src/cat (and strips the
      # top-level __init__.py so mkdocstrings can collect the package), so no
      # manual copy is needed here.
      run: |
        git fetch origin gh-pages --depth=1 || true
        uv run mike deploy --push --update-aliases --title "v2" 2 latest
        uv run mike set-default --push latest
