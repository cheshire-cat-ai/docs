name: Build and deploy mkdocs (v2 / latest) on gh-pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 4:00 AM
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # full history so mike can update the gh-pages branch

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Clone core (v2) 🐱
      uses: actions/checkout@v4
      with:
        repository: cheshire-cat-ai/core
        ref: v2
        # Relative path under $GITHUB_WORKSPACE to place the repository
        path: core

    - name: Configure Git 🔧
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Deploy v2 as "latest" with mike 🚀
      run: |
        cp -r core/src/cat ./
        # v2 ships cat/ as a regular package (top-level __init__.py); removing it
        # makes mkdocstrings/griffe treat it as a namespace package, so it can
        # discover subdirs without their own __init__.py (e.g. looking_glass).
        rm -f cat/__init__.py
        git fetch origin gh-pages --depth=1 || true
        mike deploy --push --update-aliases 2 latest
        mike set-default --push latest
