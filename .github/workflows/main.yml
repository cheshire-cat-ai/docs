name: Build and deploy docs (Astro Starlight) to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⬢
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Build 🏗️
        run: npm run build

      # v1 docs are already deployed under gh-pages /1 (served at /docs/1/).
      # We never rebuild them — just carry the existing folder into the new
      # publish so a clean (force_orphan) deploy doesn't wipe it.
      - name: Fetch current gh-pages 🗂️
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: .ghpages
        continue-on-error: true

      - name: Preserve already-deployed v1 (/docs/1/) 🧊
        run: |
          if [ -d .ghpages/1 ]; then
            echo "Carrying over existing v1 docs"
            rm -rf dist/1
            cp -r .ghpages/1 dist/1
          else
            echo "No existing v1 folder found on gh-pages — skipping"
          fi

      - name: Deploy to gh-pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Clean publish: drops stale mike artifacts (2/, latest, versions.json,
          # old top-level dirs) while the step above keeps /1 intact.
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
